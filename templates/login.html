<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            margin:0;
            height:100vh;
            overflow:hidden;
            font-family:Segoe UI;
        }

        .left{
            background: linear-gradient(135deg,#2563eb,#1e3a8a);
            color:white;
            height:100vh;

            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:40px;
        }

        .right{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f4f6f9;
        }

        .card{
            width:380px;
            padding:30px;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .form-control{
            border-radius:10px;
            padding:10px;
        }

        .btn{
            border-radius:10px;
        }

    </style>

</head>

<body>

<div class="row g-0">

    <!-- LEFT SIDE -->
    <div class="col-md-6 left">

        <h1>🎓 StudentSys</h1>
        <p class="mt-3">
            Manage students efficiently with a smart dashboard system
        </p>

    </div>

    <!-- RIGHT SIDE -->
    <div class="col-md-6 right">

        <div class="card">

            <h3 class="mb-4 text-center">Login</h3>

            <form method="POST">

                <div class="mb-3">

                    <label>Username</label>
                    <input type="text"
                           name="username"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label>Password</label>
                    <input type="password"
                           name="password"
                           class="form-control"
                           required>

                </div>

                <button class="btn btn-primary w-100">
                    Login
                </button>

            </form>

            <p class="text-center mt-3">
                Don't have account?
                <a href="/signup">Signup</a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
